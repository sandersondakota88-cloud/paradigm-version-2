<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>EXODUS · VSF Generator (Enhanced)</title><style>/* === RESET & BASE === */*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }body { background:#08080a; color:#b0b0b0; font-family:'SF Mono','Fira Code',monospace; font-size:11px; min-height:100vh; }/* === HIDDEN STATE PROBES === */#V,#P { position:absolute; left:-9999px; top:-9999px; width:0; height:0; overflow:hidden; pointer-events:none; }/* === LAYOUT === */.hdr { padding:14px 16px; border-bottom:1px solid #151518; display:flex; justify-content:space-between; align-items:center; }.hdr h1 { font:700 10px/1 inherit; color:#ddd; letter-spacing:2px; }.hdr .s { font-size:7px; color:#333; letter-spacing:1px; margin-top:2px; }.badge { padding:4px 10px; border-radius:2px; font-size:9px; font-weight:700; letter-spacing:1px; background:hsla(270,40%,20%,.2); border:1px solid hsla(270,40%,35%,.3); color:hsl(270,60%,65%); }.wrap { padding:16px; max-width:600px; margin:0 auto; }.section { margin-bottom:16px; padding:12px; border:1px solid #151518; border-radius:3px; }.stitle { font-size:7px; letter-spacing:2px; color:#444; margin-bottom:8px; }.info { font-size:8px; color:#333; line-height:1.6; margin-bottom:8px; }.pre-wrap { padding:10px; background:#0c0c0f; border:1px solid #1a1a1e; border-radius:3px; font-size:8px; line-height:1.5; overflow-x:auto; white-space:pre-wrap; word-break:break-all; color:#555; max-height:300px; overflow-y:auto; }/* === COLORS === */.h { color:hsl(270,60%,60%); }.v { color:hsl(160,50%,45%); }.d { color:hsl(0,50%,50%); }.n { color:#444; }/* === BUTTONS === */.btn { padding:12px 20px; border:1px solid hsl(160,50%,28%); background:hsl(160,50%,18%); color:hsl(160,70%,65%); border-radius:3px; font:700 10px/1 inherit; letter-spacing:2px; cursor:pointer; width:100%; margin-bottom:8px; }.btn:hover { background:hsl(160,50%,22%); }.btn.sec { background:hsla(210,40%,15%,.3); border-color:hsl(210,40%,30%); color:hsl(210,60%,60%); }.btn.sec:hover { background:hsla(210,40%,18%,.4); }/* === STATS === */.stats { display:flex; gap:8px; margin-bottom:12px; }.stat { flex:1; padding:10px; border-radius:3px; text-align:center; }.stat.a { background:hsla(270,30%,12%,.3); border:1px solid hsla(270,30%,20%,.3); }.stat.b { background:hsla(160,30%,12%,.3); border:1px solid hsla(160,30%,20%,.3); }.stat.c { background:hsla(0,30%,12%,.3); border:1px solid hsla(0,30%,20%,.3); }.stat.d { background:hsla(40,30%,12%,.3); border:1px solid hsla(40,30%,20%,.3); }.sn { font-size:18px; font-weight:700; line-height:1; }.sn.a { color:hsl(270,60%,60%); }.sn.b { color:hsl(160,60%,50%); }.sn.c { color:hsl(0,55%,50%); }.sn.d { color:hsl(40,60%,55%); }.sd { font-size:6px; letter-spacing:1px; margin-top:4px; color:#444; }/* === PROGRESS BAR === */.prog { height:3px; background:#111; border-radius:2px; margin:8px 0; overflow:hidden; }.prog-bar { height:100%; background:hsl(160,60%,40%); transition:width .1s; width:0; }</style></head><body><div id="P"></div><div id="V"></div><div class="hdr">  <div>    <h1>EXODUS · VSF GENERATOR (Enhanced)</h1>    <div class="s">ENUMERATE · COMPRESS · INJECT · ANALYZE</div>  </div>  <div class="badge">STATE → FILE</div></div><div class="wrap">  <div class="section">    <div class="stitle">ENUMERATION / COMPRESSED STATE SPACE</div>    <div class="info">All multi-dimensional coordinates explored via parametric compression. Synthetic cross-dimension constraints create near-unresolvable space.</div>    <div class="stats">      <div class="stat a"><div class="sn a" id="s-total">0</div><div class="sd">TOTAL</div></div>      <div class="stat b"><div class="sn b" id="s-valid">0</div><div class="sd">VALID</div></div>      <div class="stat c"><div class="sn c" id="s-denied">0</div><div class="sd">DENIED</div></div>      <div class="stat d"><div class="sn d" id="s-bytes">-</div><div class="sd">BYTES</div></div>    </div>    <div class="prog"><div class="prog-bar" id="prog-bar"></div></div>    <div class="log" id="log-box"></div>    <button class="btn" id="btn-enum">ENUMERATE STATE SPACE</button>    <button class="btn sec" id="btn-dl" style="display:none">DOWNLOAD .VSF FILE</button>    <button class="btn sec" id="btn-inj" style="display:none">INJECT RANDOM ROW</button>  </div></div><script>(function(){/* === DIMENSIONS & MULTI-DIMENSIONAL SPACE === */var DIMS=[  {name:"applicant",values:["individual","joint","business","trust"]},  {name:"residency",values:["domestic","foreign","diplomatic"]},  {name:"income",values:["under50","50to100","100to250","over250"]},  {name:"employment",values:["employed","self-employed","retired","student","unemployed"]},  {name:"product",values:["mortgage","personal","auto","business-line"]},  {name:"credit",values:["prime","near-prime","sub-prime"]}];/* === PROPERTIES TO READ FROM CSS === */var PROPS=["--sdf","--rt","--doc","--deny","--reg"];var P=document.getElementById("P"), V=document.getElementById("V");/* === INITIAL ATTRIBUTES === */DIMS.forEach(function(d){ P.setAttribute("data-"+d.name,d.values[0]); V.setAttribute("data-"+d.name,d.values[0]); });/* === BUILD HEADER TRIADS === */function buildHeader(){ return DIMS.map(function(d){  var maps=d.values.map(function(v,i){return v+"="+i;}).join(",");  return d.name+":"+maps+"|0|"+(d.values.length-1);});}var headerTriads=buildHeader();var totalStates=DIMS.reduce(function(a,d){return a*d.values.length;},1);/* === PROBE FUNCTION === */function probe(coords){  for(var i=0;i<DIMS.length;i++){ P.setAttribute("data-"+DIMS[i].name,DIMS[i].values[coords[i]]);}  var cs=getComputedStyle(P),r={};  PROPS.forEach(function(p){ r[p]=cs.getPropertyValue(p).trim().replace(/"/g,""); });  return r;}/* === ENUMERATION / COMPRESSION === */var vsfHeader="", vsfRows=[], vsfFull="";document.getElementById("btn-enum").addEventListener("click",function(){  vsfRows=[]; var valid=0,denied=0,count=0; var coords=new Array(DIMS.length).fill(0);  var logBox=document.getElementById("log-box"),progBar=document.getElementById("prog-bar");  var batch=200; vsfHeader=headerTriads.join(" | ");  logBox.innerHTML='<div style="color:hsl(210,50%,50%)">Enumerating ~'+totalStates+' coordinates...</div>';  function step(){    var end=Math.min(count+batch,totalStates);    while(count<end){      var ci=coords.slice(),res=probe(ci);      // === COMPLEXITY MULTIPLIER ===      var sdf=-1;      if(ci[0]==2 && ci[4]==0 && ci[5]==2) sdf=1; // cross-dim synthetic denial      if(ci[3]==4 && ci[5]==2 && ci[1]==1) sdf=1; // another synthetic hard constraint      var row=ci.join(",")+","+sdf+","+res["--rt"]+","+res["--doc"]+","+(res["--deny"]||"")+","+res["--reg"];      vsfRows.push(row);      if(sdf==-1) valid++; else denied++; count++;      for(var d=DIMS.length-1;d>=0;d--){ coords[d]++; if(coords[d]<DIMS[d].values.length) break; coords[d]=0; }    }    document.getElementById("s-total").textContent=count;    document.getElementById("s-valid").textContent=valid;    document.getElementById("s-denied").textContent=denied;    progBar.style.width=((count/totalStates)*100)+"%";    if(count<totalStates){ requestAnimationFrame(step); } else {      vsfFull=vsfHeader+"\n"+vsfRows.join("\n");      var bytes=new Blob([vsfFull]).size; document.getElementById("s-bytes").textContent=bytes.toLocaleString();      logBox.innerHTML='<div style="color:hsl(160,50%,45%)">Done. '+count+' points.</div>'+                       '<div style="color:#444">'+valid+' valid · '+denied+' denied · '+bytes.toLocaleString()+' bytes</div>';      document.getElementById("btn-dl").style.display="block";      document.getElementById("btn-inj").style.display="block";    }  }  requestAnimationFrame(step);});/* === DOWNLOAD VSF === */document.getElementById("btn-dl").addEventListener("click",function(){  var blob=new Blob([vsfFull],{type:"text/csv"}); var url=URL.createObjectURL(blob);  var a=document.createElement("a"); a.href=url; a.download="vessel-state.vsf";  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);});/* === INJECTION / ANALYSIS === */document.getElementById("btn-inj").addEventListener("click",function(){  var idx=Math.floor(Math.random()*vsfRows.length),row=vsfRows[idx],parts=row.split(",");  var stmtCount=0; // track JS statements executed  // === INJECTION ===  for(var i=0;i<DIMS.length;i++){ V.setAttribute("data-"+DIMS[i].name,DIMS[i].values[parseInt(parts[i])]); stmtCount++; }  var cs=getComputedStyle(V); stmtCount+=PROPS.length; // reading props  alert("Injected row "+idx+". Approx JS statements executed: "+stmtCount);});})();</script></body></html>
