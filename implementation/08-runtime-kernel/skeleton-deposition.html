    // Partition into live and recalled
    const partition = Field.partitionMatches(allMatched);
    const matched = partition.live;     // indices into Field.constraints
    const recalledMatches = partition.recalled;  // {combinedIdx, windowIdx, record}

    // Phase 4c: handle recalled matches. Each recalled record that
    // matched current input gets:
    //   - Reinforcement (weight bump, recallSuccessCount increment)
    //   - A surface event for observation
    //   - Persistence-back so the strengthened record is durable
    if (recalledMatches.length > 0) {
      this.recallMatchesProduced += recalledMatches.length;
      for (const rm of recalledMatches) {
        const reinforced = Field.reinforceRecallMatch(rm.windowIdx);
        if (reinforced) {
          Field.recordRecallEvent("recalled", {
            id: reinforced.id,
            originalKind: reinforced.kind,
            desc: reinforced.desc,
            recallSuccessCount: reinforced.recallSuccessCount,
            persistedAt: reinforced.persistedAt
          });
          // Persist the reinforced version back so the boost is durable.
          // Fire-and-forget: don't await (would block the input op).
          if (this.storageBinding) {
            this.storageBinding.persistConstraint(reinforced).catch(() => {});
          }
        }
      }
      Trace.append("ct", "recall-matched", vBefore,
        "+" + recalledMatches.length + " persisted record(s) matched current input",
        "recalled");
    }

    // Phase 4b: evaluate compound constraints CPU-side. Compounds are
    // not in the ER engine's instruction stream because their exec-side
    // predicate references CT-engine state. They match here, after
    // render-side resolution, and merge into the matched set so they
    // contribute to selection, fidelity, and surface observation the
    // same way other constraints do.
    const compoundMatched = Field.evaluateCompounds(input);
    // Phase 4d: record matched compound IDs for surface observation
    // (Pass B compound-active detector reads this).
    Field.lastMatchedCompoundIds = compoundMatched
      .map(idx => Field.constraints[idx])
      .filter(c => c)
      .map(c => c.id);
    if (compoundMatched.length) {
      for (const idx of compoundMatched) {
        if (matched.indexOf(idx) === -1) matched.push(idx);
      }
      Trace.append("ct", "compound-matched", vBefore,
        "+" + compoundMatched.length + " compound(s)");
    }

    const novelty = Field.constraints.length <= 1
      ? 1.0
      : 1.0 - (matched.length / (Field.constraints.length - 1));
    const evalResult = { matched: matched, novelty: Guards.clamp01(novelty) };

    const chosen = Field.selectFromMatches(matched, named);
    const chosenIndices = chosen.map(c => c.idx);

    // Ratify matched predictions
    const ratified = [];
    for (const idx of matched) {
      const c = Field.constraints[idx];
      if (c && c.kind === "predictive" && Field.ratify(idx)) ratified.push(c);
    }
    if (ratified.length) {
      Trace.append("ct", "ratification", vBefore, "ratified " + ratified.length, "ratified");
    }

    // Generate derived constraints from novelty
    const generated = Field.generate(input, evalResult);
    if (generated.length) {
      Field.integrate(generated);
      Trace.append("ct", "generated", vBefore, "+" + generated.length + " derived");
    }

    // Update correlations from co-firing
    if (chosenIndices.length >= 2) Field.updateCorrelations(chosenIndices);
    Field.markUsed(chosenIndices);
    const touched = chosenIndices
      .map(i => Field.constraints[i] && Field.constraints[i].id)
      .filter(Boolean);
    Field.recordOp("input", touched);

    // Refresh render-scope delta after generation/marking
    Field.refreshVectorDelta();
    Field.updateSlowDelta(Field.scalarDelta);
    Field.refreshVectorDelta();
    let vAfter = {
      scalar: Field.scalarDelta, fast: Field.fastDelta,
      slow: Field.slowDelta, gap: Field.gap
    };

    // Naming bias to render-scope delta
    if (wasNamed) {
      const bonus = Math.min(0.4, CFG.NAMING_DELTA_DROP * named.length);
      vAfter.scalar = Math.max(0, vAfter.scalar - bonus);
      Field.scalarDelta = vAfter.scalar;
      Trace.append("ct", "naming-bias", vAfter, "-" + bonus.toFixed(3));
    }

    Field.modulate();
    const absDrop = vBefore.scalar - vAfter.scalar;
    const relDrop = vBefore.scalar > 0.001 ? absDrop / vBefore.scalar : 0;
    Field.recordFidelity(chosenIndices, relDrop);

    // Phase 4b: record compound fidelity for compounds that matched
    // this input. Same observation (relDrop) gets attributed to compounds
    // that contributed; sustained drops promote them.
    if (compoundMatched.length) {
      Field.recordCompoundFidelity(compoundMatched, relDrop);
    }

    Field.reinforceNaming(wasNamed);

    // Phase 4b: snapshot generation history for compound generation
    // triggers. This must happen AFTER ratification, naming, and delta
    // refresh so the snapshot reflects the full post-input state.
    Field.recordCompoundGenerationSnapshot();

    // Phase 4b: detect coincidence triggers and generate compounds
    const compounds = Field.generateCompounds(input);
    if (compounds.length) {
      Field.integrate(compounds);
      Trace.append("ct", "compounds-formed", vAfter,
        "+" + compounds.length + " compound(s)");
    }

    // Phase 4b: check for compound promotions
    const promotedCompounds = Field.checkCompoundPromotions();
    if (promotedCompounds.length) {
      Trace.append("ct", "compounds-promoted", vAfter,
        "+" + promotedCompounds.length + " promoted");
    }

    // Render-scope predictive generation (still done CT-side because
    // prediction is shape-derivative; per IMPLEMENTATION_PATH this is
    // CPU-side, which means the CT engine does it)
    const predictions = Field.generatePredictions();
    if (predictions.length) {
      Field.integrate(predictions);
      Trace.append("ct", "predictions-generated", vAfter,
        "+" + predictions.length + " predictive (gap=" + vAfter.gap.toFixed(3) + ")",
        "predicted");
    }
    const evicted = Field.evictStalePredictions();
    if (evicted.length) {
      Trace.append("ct", "predictions-evicted", vAfter, "-" + evicted.length + " aged out");
    }

    Trace.append("ct", "input-commit", vAfter,
      "chosen=" + chosen.length + " gen=" + generated.length + " rat=" + ratified.length);

    // Phase 4c: persist newly-eligible records. Fire-and-forget so we
    // don't block the input op on storage. The persistence eligibility
    // helper decides what's worth persisting; this op just calls it.
    if (this.storageBinding && this.persistenceEligibility) {
      this._persistEligibleRecords(ratified, promotedCompounds);
    }

    return {
      input: input,
      chosen: chosen.length,
      generated: generated.length,
      predictions: predictions.length,
      ratified: ratified.length,
      recalledMatches: recalledMatches.length,
      named: named.map(s => s.name),
      vBefore: vBefore,
      vAfter: vAfter
    };
  }

  // Phase 4c: persist records that became eligible during this input.
  // Called fire-and-forget. Records considered:
  //   - Newly ratified constraints
  //   - Newly promoted compounds
  //   - Subcascades that just got promoted (consolidated this step)
  //   - Tagged trace entries (for the trace store)
  _persistEligibleRecords(ratified, promotedCompounds) {
    if (!this.storageBinding || !this.persistenceEligibility) return;

    // Ratified constraints
    for (const c of ratified) {
      if (this.persistenceEligibility.shouldPersistConstraint(c)) {
        this.storageBinding.persistConstraint(c)
          .then(() => { this.persistedConstraintCount += 1; })
          .catch(() => {});
      }
    }

    // Promoted compounds
    for (const c of promotedCompounds) {
      if (this.persistenceEligibility.shouldPersistConstraint(c)) {
        this.storageBinding.persistConstraint(c)
          .then(() => { this.persistedConstraintCount += 1; })
          .catch(() => {});
      }
    }

    // Subcascades that were just promoted (lastNamed === step is
    // a proxy for recently-active; full eligibility is "all sub-
    // cascades because they're high-signal by construction")
    for (const sc of Field.subcascades) {
      // Persist all subcascades - they're inherently high-signal
      this.storageBinding.persistSubcascade(sc).catch(() => {});
    }
  }

  _opTick() {
    Field.step++;
    Field.refreshVectorDelta();
    Field.updateSlowDelta(Field.scalarDelta);
    Field.refreshVectorDelta();
    Field.modulate();
    const preds = Field.generatePredictions();
    if (preds.length) {
      Field.integrate(preds);
      Trace.append("ct", "tick-predictions", null, "+" + preds.length + " predictive", "predicted");
    }
    Field.evictStalePredictions();
    Trace.append("ct", "tick", null, "idle advance");
    return { step: Field.step };
  }

  _opDevelop() {
    const produced = Field.developPatterns();
    Field.refreshVectorDelta();
    Trace.append("ct", "develop", null, "+" + produced.length + " meta");
    OpsLog.append("DEVELOP", produced.length === 0
      ? "no new patterns"
      : "produced " + produced.length + " meta");
    return { count: produced.length };
  }

  _opCorrelate() {
    const top = Field.topCorrelations(15);
    Trace.append("ct", "correlate-inspect", null, top.length + " top pairs");
    OpsLog.append("CORRELATE", top.length === 0 ? "none" : "top " + top.length + " inspected");
    return { count: top.length };
  }

  _opReason() {
    const f = Field.reason();
    Trace.append("ct", "reason", null, f.length + " findings");
    for (let i = 0; i < f.length && i < 4; i++) OpsLog.append("REASON", f[i].text);
    if (f.length === 0) OpsLog.append("REASON", "no findings");
    return { count: f.length, findings: f };
  }

  _opPromote() {
    const p = Field.checkPromotions();
    Trace.append("ct", "check-promotions", null, p.length === 0 ? "none" : "+" + p.length);
    if (p.length === 0) {
      OpsLog.append("PROMOTE", "no families met threshold");
    } else {
      for (const sc of p) {
        OpsLog.append("PROMOTE",
          "'" + sc.name + "' (" + sc.familyType + ") fid=" + sc.fidAtBirth.toFixed(3));
      }
    }
    return { count: p.length, promoted: p.map(sc => sc.name) };
  }

  // ----------------------------------------------------------
  // EXECUTION-SCOPE PREDICTIVE GENERATION
  //
  // When execution-scope gap is high, the CT engine reaches:
  // it generates operations it expects to need in upcoming steps.
  //
  // Examples:
  // - If ratification rate is high and pending queue is shrinking,
  //   schedule a TICK to keep the field metabolizing
  // - If recent ops show repeated INPUTs but no DEVELOP, schedule
  //   a DEVELOP to consolidate
  // - If exec-gap is high but render-gap is low, the CT engine
  //   has lagged behind the rendering substrate; schedule REASON
  //   to inspect what state the divergence reflects
  //
  // These are predictions in the SE-05 sense: constraint-shaped
  // candidates for closure, generated when a gap opens. They get
  // ratified when the predicted op is what actually happens next,
  // or aged out and discarded if not.
  // ----------------------------------------------------------
  _generateExecPredictions() {
    if (this.recentExecOps.length < 4) return;

    // Heuristic 1: if last 4+ ops were INPUTs without DEVELOP/CORRELATE,
    // predict that DEVELOP would close exec-gap
    const lastFour = this.recentExecOps.slice(-4);
    const allInputs = lastFour.every(op => op.kind === OP_KIND.INPUT);
    if (allInputs && !Field.ctPendingOps.some(op => op.kind === OP_KIND.DEVELOP)) {
      this.enqueueInternal(OP_KIND.DEVELOP, { source: "exec-predict" });
      this.predictionsGeneratedExec++;
      Trace.append("ct", "exec-predict", null, "predicting DEVELOP (4 inputs without consolidation)");
      return;
    }

    // Heuristic 2: if exec-gap is high and queue is empty, predict TICK
    if (Field.ctPendingOps.length === 0 && Field.execGap > CFG.EXEC_GAP_PREDICT_THRESH * 1.5) {
      this.enqueueInternal(OP_KIND.TICK, { source: "exec-predict" });
      this.predictionsGeneratedExec++;
      Trace.append("ct", "exec-predict", null, "predicting TICK (high exec-gap, idle queue)");
      return;
    }

    // Heuristic 3: if many constraints exist but no recent PROMOTE check,
    // predict PROMOTE
    const lastPromote = this.recentExecOps.findIndex(op => op.kind === OP_KIND.PROMOTE);
    if (lastPromote === -1 && Field.constraints.length > 10
        && Object.keys(Field.familyFidelity).length > 0
        && !Field.ctPendingOps.some(op => op.kind === OP_KIND.PROMOTE)) {
      this.enqueueInternal(OP_KIND.PROMOTE, { source: "exec-predict" });
      this.predictionsGeneratedExec++;
      Trace.append("ct", "exec-predict", null, "predicting PROMOTE (untested fidelity)");
    }
  }

  _opExecPredict(payload) {
    // No-op: exec-predict is a marker op recording that prediction
    // happened. The actual prediction work runs at the start of step().
    return { source: payload && payload.source };
  }

  _opSnapshot() {
    const json = Field.serialize();
    const ok = PersistAdapter.saveFieldSnapshot(json);
    if (ok) {
      this.snapshotCount++;
      Field.ctLastSnapshotStep = Field.step;
      Trace.append("ct", "snapshot", null, "field state persisted (" + json.length + " bytes)");
    } else {
      Trace.append("ct", "snapshot-failed", null, "no persistent storage available");
    }
    return { ok: ok, bytes: json.length };
  }

  _opTraceFlush() {
    const unflushed = Trace.unflushed();
    if (unflushed.length === 0) return { flushed: 0 };
    const ok = PersistAdapter.appendTrace(unflushed);
    if (ok) {
      Trace.markFlushed();
      this.traceFlushCount++;
    }
    return { flushed: unflushed.length, ok: ok };
  }

  // ----------------------------------------------------------
  // PERSISTENCE SCHEDULING
  //
  // After every committed op, the CT engine checks whether
  // persistence work needs scheduling. Snapshots happen at
  // CT_SNAPSHOT_INTERVAL steps; trace flushes when accumulated
  // entries exceed CT_TRACE_FLUSH_INTERVAL.
  //
  // Per SE-06: the CT engine is responsible for state durability.
  // The ER engine is in-memory only; a frame's results are not
  // persisted unless the CT engine commits them.
  // ----------------------------------------------------------
  _maybeSchedulePersistence() {
    if (!PersistAdapter.available()) return;

    const stepsSinceSnapshot = Field.step - Field.ctLastSnapshotStep;
    if (stepsSinceSnapshot >= CFG.CT_SNAPSHOT_INTERVAL
        && !Field.ctPendingOps.some(op => op.kind === OP_KIND.SNAPSHOT)
        && (!Field.ctInFlightOp || Field.ctInFlightOp.kind !== OP_KIND.SNAPSHOT)) {
      this.enqueueInternal(OP_KIND.SNAPSHOT, {});
    }

    const unflushed = Trace.unflushed().length;
    if (unflushed >= CFG.CT_TRACE_FLUSH_INTERVAL
        && !Field.ctPendingOps.some(op => op.kind === OP_KIND.TRACE_FLUSH)
        && (!Field.ctInFlightOp || Field.ctInFlightOp.kind !== OP_KIND.TRACE_FLUSH)) {
      this.enqueueInternal(OP_KIND.TRACE_FLUSH, {});
    }
  }

  // ----------------------------------------------------------
  // STARTUP RESTORE
  //
  // On host initialization, the CT engine attempts to restore
  // the field state from the most recent snapshot. If no
  // snapshot exists, the field starts seed-only.
  // ----------------------------------------------------------
  restoreFromSnapshot() {
    const json = PersistAdapter.loadFieldSnapshot();
    if (!json) return false;
    const ok = Field.deserialize(json);
    if (ok) {
      Trace.append("ct", "restore", null,
        "restored field at step " + Field.step + " (" + Field.constraints.length + " constraints)");
    } else {
      Trace.append("ct", "restore-failed", null, "snapshot data invalid; starting fresh");
      Field.reset();
    }
    return ok;
  }

  // Force-clear all persisted state (called by RESET button)
  clearPersistence() {
    PersistAdapter.clearAll();
    Trace.append("ct", "persistence-cleared", null, "all snapshots and trace removed");
  }

  // Stats for UI
  getStats() {
    return {
      opsExecuted: this.opsExecuted,
      predictionsExec: this.predictionsGeneratedExec,
      snapshots: this.snapshotCount,
      traceFlushes: this.traceFlushCount,
      pending: Field.ctPendingOps.length,
      inFlight: Field.ctInFlightOp ? Field.ctInFlightOp.kind : null,
      committed: Field.ctCommittedQueue.length,
      execScalar: Field.execScalarDelta,
      execGap: Field.execGap,
      persistAvailable: PersistAdapter.available()
    };
  }
}

const CTengineModule = Object.freeze({
  CTengine: CTengine,
  OP_KIND: OP_KIND,
  PersistAdapter: PersistAdapter,
  PersistKeys: PersistKeys
});

if (typeof module !== "undefined" && module.exports) {
  module.exports = CTengineModule;
} else {
  global.CTengineModule = CTengineModule;
}

})(typeof globalThis !== "undefined" ? globalThis : (typeof window !== "undefined" ? window : this));

/* === field-intake-extension.js (Phase 8 runtime) === */
// ============================================================================
// field-intake-extension.js  --  SE-08 input-feature buffer (Phase 8)
// ============================================================================
//
// SPEC ANCHOR: SE-08
//   "New module: input-feature buffer. Lives in field.js as shared state.
//    Has bounded capacity per I3. Adapters write to it; ER reads it; CT
//    does not write it."
//
// CONTRACT REFERENCE: KERNEL_RUNTIME_CONTRACT.md sec 2 (Input intake:
// contributor records into the field).
//
// STRUCTURAL COMMITMENT (per SE-08):
//   - The buffer is part of the substrate (S1: shared, owned by neither)
//   - Adapters publish records on their own clock (F3: no supervision)
//   - ER reads buffer alongside live constraints (S3: coupling via field)
//   - CT samples shared field state on its own clock (S3 again)
//   - I3-bounded: explicit cap; eviction on overflow
//   - M5: trace fires when ER observes state changes, NOT when adapter writes
//
// SHAPE (per contract sec 2):
//   Field.intake = {
//     records: [],            // contributor records, FIFO order
//     cap: <int>,             // I3 bound (default 256)
//     totalReceived: <int>    // running counter (monotonic)
//   }
//
//   Field.intake.publish({ type, value, timestamp, source })
//     - returns void (per F3: no return value to adapters)
//     - evicts oldest record(s) when records.length >= cap
//     - increments totalReceived regardless of eviction
//
//   Field.intake.snapshot()
//     - returns shallow array copy of current records
//     - for ER consumption per resolution pass
//
// USAGE:
//   This module attaches Field.intake to Field after field.js loads.
//   Calling install(FieldModule) extends Field with intake state and
//   wraps Field.reset() to also reset intake.
//
// HONORS:
//   I1 (ASCII), I3 (bounded), I4 (no eval), F3 (no command path),
//   S1 (shared substrate), F4 (does not block tick loop), M5 (no
//   trace writes from publish).
// ============================================================================

"use strict";

(function (global) {

const DEFAULT_CAP = 256;

// ============================================================================
// install: attach Field.intake to a FieldModule's Field instance
// ============================================================================

function install(FieldModule, opts) {
  opts = opts || {};
  const cap = (opts.cap | 0) || DEFAULT_CAP;
  const Field = FieldModule.Field;

  if (!Field) {
    throw new Error("field-intake-extension: FieldModule has no Field");
  }
  if (Field.intake) {
    // Already installed; idempotent
    return Field.intake;
  }

  // ---- intake state ----
  // Hung directly on Field per SE-08 (the buffer "lives in field.js
  // as shared state").
  Field.intake = {
    records: [],
    cap: cap,
    totalReceived: 0,

    publish: function (record) {
      // Validate record shape per SE-08 contract sec 2:
      //   { type, value, timestamp, source }
      if (!record || typeof record !== "object") {
        // Silently ignore malformed records per F3 (no error path back
        // to caller). A future verifier may scan for adapter validation
        // problems; the buffer itself remains permissive at the boundary.
        return;
      }
      // Append. I3 bound enforced.
      this.records.push({
        type: String(record.type || ""),
        value: record.value,
        timestamp: (record.timestamp | 0),
        source: String(record.source || "")
      });
      this.totalReceived++;
      // Evict oldest if over cap. The records array is FIFO so shift
      // from the front.
      while (this.records.length > this.cap) {
        this.records.shift();
      }
      // No return value (F3).
    },

    snapshot: function () {
      // Shallow copy. ER reads this each resolution pass. Returning a
      // copy means a long resolution pass doesn't see live mutations
      // from concurrent publishes. Mid-pass mutations land on next pass.
      return this.records.slice();
    },

    // For diagnostics / testing only - not for engine consumption.
    occupancy: function () {
      return this.records.length;
    },

    // Adapter backpressure read - SE-08: "backpressure must be substrate-
    // readable; adapters can read records.length to self-throttle."
    // This is just a convenience accessor; reading records.length directly
    // is also valid.
    isFull: function () {
      return this.records.length >= this.cap;
    },

    clear: function () {
      this.records.length = 0;
      // totalReceived is monotonic - persists across clear() (the M5 trace
      // and the buffer occupancy are different facts).
    }
  };

  // ---- wrap Field.reset() to clear intake ----
  // Field.reset re-initializes all field state. Intake should reset too,
  // since the field is being returned to canonical starting state.
  const originalReset = Field.reset.bind(Field);
  Field.reset = function () {
    originalReset();
    if (Field.intake) {
      Field.intake.clear();
      Field.intake.totalReceived = 0;
    }
  };

  return Field.intake;
}

// ============================================================================
// Exports
// ============================================================================

const FieldIntakeExtension = Object.freeze({
  install: install,
  DEFAULT_CAP: DEFAULT_CAP
});

if (typeof module !== "undefined" && module.exports) {
  module.exports = FieldIntakeExtension;
} else {
  global.FieldIntakeExtension = FieldIntakeExtension;
}

})(typeof globalThis !== "undefined" ? globalThis : (typeof window !== "undefined" ? window : this));

/* === kernel-cascade-evaluator.js (Phase 8 runtime) === */
// ============================================================================
// kernel-cascade-evaluator.js  --  ER pass for cascade-match constraints
// ============================================================================
//
// This is the kernel substrate's per-tick evaluation of cascade-match
// constraints. It mirrors the standalone kernel-cascade-match-oracle.js
// (which is used for S2 verification against the Phase 7 oracle) but
// integrates with the live Field state.
//
// SPEC GROUNDING:
//   - SE-06: ER and CT couple through delta only. This module is part
//     of the kernel's ER side. CT does not call it directly; CT samples
//     the field state it produces.
//   - SE-08: ER reads buffer alongside live constraints. Per-tick
//     evaluation reads Field.intake and Field.constraints; writes match
//     flags onto each constraint's own state (constraint.lastMatched,
//     constraint.uses, constraint.lastUsed).
//   - S2: substrate-resolution deterministic. The match logic here is
//     identical to kernel-cascade-match-oracle.js (which the s2-verifier
//     proves byte-equivalent to Phase 7's oracle).
//   - F1: seed at constraints[0] is permanent; not modified by this pass.
//   - F2: delta is one formula at every scope. This pass does not mutate
//     vector-delta directly; the existing field.js _enforceCaps + delta
//     refresh handles that.
//   - M5: trace fires when match flags flip (state observable change),
//     not on every read.
//
// SHAPE (input):
//   - field: the Field object (from FieldModule)
//   - opts: { traceModule: optional Trace for trace appends }
//
// SHAPE (output):
//   - returns { matchedCount, evaluatedCount, currentNextOp, coordSnapshot }
//   - mutates field.constraints[i].uses, lastUsed, lastMatched
//   - mutates field.cascadeOutput (new field state property holding
//     the resolved --next-op value, for CT to sample)
// ============================================================================

"use strict";

(function (global) {

const KernelOracle = (typeof require !== "undefined")
  ? require("./kernel-cascade-match-oracle.js")
  : global.KernelCascadeMatchOracle;

// ============================================================================
// buildCoordSnapshotFromIntake
// ============================================================================
//
// Reads the current Field.intake records and builds a coord-state map
// representing the substrate's current input shape. The map's keys are
// dimension names (without "data-" prefix); values are the dimension
// values most-recently published.
//
// SE-08 NOTE: this pass over the buffer is the ER engine's "reads buffer
// alongside live constraints". It runs per resolution pass; it does not
// command adapters; adapters publish on their own clock.
//
// The intake records have shape { type, value, timestamp, source } per
// SE-08. The synthesis convention used here:
//
//   record.type = "dom::<dimname>" - dimname is a coord dimension
//     value: { dimname: <value-string> }
//
//   record.type = "time::<dimname>" - dimname is a coord dimension
//     value: <value-string-or-number>
//
// Other type prefixes are ignored by cascade-match; they may be consumed
// by other matcher types (predictive, text-token, etc.).
// ============================================================================

function buildCoordSnapshotFromIntake(field) {
  const coordValues = {};
  if (!field.intake || !field.intake.records) return coordValues;
  // Walk in order; later publishes overwrite earlier (latest wins per dim)
  for (const rec of field.intake.records) {
    if (typeof rec.type !== "string") continue;
    const colonIdx = rec.type.indexOf("::");
    if (colonIdx < 0) continue;
    const prefix = rec.type.substring(0, colonIdx);
    const dimName = rec.type.substring(colonIdx + 2);
    // For dom:: events, the value may be an object with the dim
    if (prefix === "dom" && rec.value && typeof rec.value === "object") {
      // value contains a map of dim -> value (e.g., {trigger: "toggle"})
      for (const k of Object.keys(rec.value)) {
        coordValues[k] = String(rec.value[k]);
      }
    } else {
      // Generic: rec.value is the dim value directly
      coordValues[dimName] = String(rec.value);
    }
  }
  return coordValues;
}

// ============================================================================
// evaluateCascade
// ============================================================================
//
// Per-tick ER pass over cascade-match constraints in the field.
//
// Walks all constraints with pattern.type === "cascade-match"; for each,
// evaluates against the current coord snapshot. Updates per-constraint
// match state. Last matching constraint per emit.property wins (cascade
// semantics: later rules override earlier).
//
// Honors F1: never modifies the seed (constraints[0] with kind=seed).
// ============================================================================

function evaluateCascade(field, opts) {
  opts = opts || {};
  const Trace = opts.traceModule || null;

  if (!field || !field.constraints) {
    return {
      matchedCount: 0,
      evaluatedCount: 0,
      currentNextOp: null,
      coordSnapshot: {}
    };
  }

  const coordValues = buildCoordSnapshotFromIntake(field);

  // Per-emit-property latest match
  const latestMatchByProp = {};

  let matchedCount = 0;
  let evaluatedCount = 0;

  for (let i = 0; i < field.constraints.length; i++) {
    const c = field.constraints[i];
    if (!c.pattern || c.pattern.type !== "cascade-match") continue;
    if (c.kind === "seed") continue;  // F1: seed not subject to cascade-match

    evaluatedCount++;
    const wasMatched = !!c.lastMatched;
    const matched = matchConstraintWithoutGeometry(c, coordValues);

    // Update constraint state (these are the "match flags" SE-08 references)
    c.lastMatched = matched;
    if (matched) {
      matchedCount++;
      c.uses = (c.uses | 0) + 1;
      c.lastUsed = field.step | 0;
      // Track latest match per property (cascade override semantics)
      if (c.emit && c.emit.property) {
        latestMatchByProp[c.emit.property] = c;
      }
      // M5: trace fires on match-flag flip from false to true
      if (!wasMatched && Trace) {
        Trace.append("er", "cascade-match", null,
          c.id + " -> " + c.emit.property + "=" + JSON.stringify(c.emit.value));
      }
    } else {
      // M5: trace fires on flip from true to false
      if (wasMatched && Trace) {
        Trace.append("er", "cascade-unmatch", null, c.id);
      }
    }
  }

  // Surface the resolved --next-op as field state for CT sampling.
  // Using a dedicated field property (field.cascadeOutput) per the
  // contract sec 3 "the cascade's --next-op is field state".
  if (!field.cascadeOutput) {
    field.cascadeOutput = {};
  }
  let currentNextOp = null;
  for (const prop of Object.keys(latestMatchByProp)) {
    const c = latestMatchByProp[prop];
    field.cascadeOutput[prop] = {
      value: c.emit.value,
      sourceConstraintId: c.id,
      atStep: field.step | 0
    };
    if (prop === "--next-op") {
      currentNextOp = c.emit.value;
    }
  }
  // Clear any previously-resolved properties no longer matched
  for (const prop of Object.keys(field.cascadeOutput)) {
    if (!latestMatchByProp[prop]) {
      delete field.cascadeOutput[prop];
    }
  }

  return {
    matchedCount: matchedCount,
    evaluatedCount: evaluatedCount,
    currentNextOp: currentNextOp,
    coordSnapshot: coordValues
  };
}

// ============================================================================
// matchConstraintWithoutGeometry
// ============================================================================
//
// Match logic for runtime evaluation - no geometry available (the
// kernel runtime doesn't carry the pre-computed geometry; geometry is
// a S2-verification artifact). Distinguishes presence-only attrs ("*")
// from value-tested attrs.
//
// Per the synthesizer convention:
//   selector["data-substrate-state"] = "*"   - presence-only marker
//   selector["data-trigger"] = "toggle"      - value test
//
// At runtime, presence-only attrs are always-true: the deposition's
// state element always has them set (per Phase 7 emission).
// ============================================================================

function matchConstraintWithoutGeometry(constraint, coordValues) {
  if (!constraint.pattern || constraint.pattern.type !== "cascade-match") {
    return false;
  }
  const sel = constraint.pattern.selector;
  for (const attr of Object.keys(sel)) {
    const required = sel[attr];
    const dimName = stripDataPrefix(attr);
    if (required === "*") {
      // Presence-only: the runtime treats this as always-true on a
      // state-element coord. The Phase 7 emission discipline guarantees
      // this attribute is present on the state element.
      continue;
    }
    const actual = coordValues[dimName];
    if (actual !== required) return false;
  }
  return true;
}

function stripDataPrefix(attr) {
  if (typeof attr !== "string") return attr;
  if (attr.indexOf("data-") === 0) return attr.substring(5);
  return attr;
}

// ============================================================================
// Exports
// ============================================================================

const KernelCascadeEvaluator = Object.freeze({
  evaluateCascade: evaluateCascade,
  buildCoordSnapshotFromIntake: buildCoordSnapshotFromIntake,
  matchConstraintWithoutGeometry: matchConstraintWithoutGeometry,
  stripDataPrefix: stripDataPrefix
});

  module.exports = KernelCascadeEvaluator;
} else {
  global.KernelCascadeEvaluator = KernelCascadeEvaluator;
}

<script>
/* === dom-bridge.js (Phase 8 runtime) === */
// ============================================================================
// dom-bridge.js  --  Browser-side bidirectional flow (Phase 8 K1)
// ============================================================================
//
// CONTRACT REFERENCE: KERNEL_RUNTIME_CONTRACT.md sec 4
//
// The bridge runs in browser context. It does NOT contain application
// logic; it is a transparent shim between two non-JS substrates:
//
//   - the DOM (browser CSS engine reads attributes, evaluates cascade)
//   - the kernel field (JS-level state, per SE-08 input-feature buffer)
//
// FLOW 4a: field state -> DOM (called per tick)
//   Reads Field.intake snapshot, builds coord state, writes data-*
//   attributes onto the state element. Browser CSS engine then
//   reads those attrs, evaluates cascade, surfaces --next-op via
//   custom property.
//
// FLOW 4b: DOM events -> field intake (called by event listener)
//   On click/input/keydown, wraps the event into a contributor
//   record and calls Field.intake.publish. The published record
//   participates in the next cascade resolution pass.
//
// SAMPLING (criterion 4 dispatch):
//   The bridge has TWO equivalent sampling paths:
//     (a) sampleNextOp() reads Field.cascadeOutput["--next-op"]
//         directly (kernel evaluator authoritative)
//     (b) sampleNextOpFromCss() reads getComputedStyle(stateElement)
//         .getPropertyValue("--next-op") (browser CSS authoritative)
//   Per S2: both paths yield the same value when constraint
//   geometry is consistent. The kernel evaluator is the canonical
//   path because it works in Node and browser identically; the CSS
//   path requires the browser CSS engine.
//
// INVARIANTS HONORED
//   - S1: bridge holds NO authoritative state. Field is the
//     authority. Each projectFieldToDOM call regenerates DOM from
//     current field state.
//   - F3: bridge does not command engines. It calls publish() and
//     enqueueFromCascade() on its own clock (the tick loop).
//   - M5: bridge does NOT write to Trace.
//   - I1: ASCII source.
//   - I4: no eval/Function/document.write.
//
// FAILURE MODES (commented for future maintainers)
//   - DO NOT cache field state in the bridge. Always re-read.
//   - DO NOT process DOM events through application logic in JS.
//     Wrap-and-publish only.
//   - DO NOT mutate field directly from event handlers. Publish
//     to intake; let ER's resolution pass do the work.
// ============================================================================

"use strict";

(function (global) {

// ============================================================================
// Bridge state - per-instance (init creates a new bridge object)
// ============================================================================

function createBridge() {
  let _field = null;
  let _stateElement = null;
  let _listeners = [];   // for teardown
  let _lastObservedNextOp = null;
  let _lastObservedAtStep = -1;
  let _projectionCount = 0;

  // ----------------------------------------------------------------------
  // init: wire to field, locate state element
  // ----------------------------------------------------------------------
  function init(field, stateElement) {
    _field = field;
    _stateElement = stateElement;
    if (!_field) throw new Error("dom-bridge: field required");
    if (!_stateElement) throw new Error("dom-bridge: stateElement required");
    if (!_field.intake) {
      throw new Error("dom-bridge: field.intake not installed; " +
        "call FieldIntakeExtension.install(FieldModule) first");
    }
    // Verify state element supports the DOM APIs we need. If not, this
    // is a stub or non-DOM environment; the bridge stays initialized
    // but projectFieldToDOM and event listening become no-ops.
    if (typeof _stateElement.setAttribute !== "function" ||
        typeof _stateElement.hasAttribute !== "function") {
      _stateElement = null;  // degrade to no-op projection
    }
    _projectionCount = 0;
    _lastObservedNextOp = null;
    _lastObservedAtStep = -1;
  }

  // ----------------------------------------------------------------------
  // projectFieldToDOM: flow 4a
  //
  // Walk Field.intake records; for each "dom::*" or "time::*" record
  // whose value names a coord dimension, set the data-* attribute.
  // Latest record per dimension wins (FIFO buffer; later overwrites).
  //
  // S1 honored: regenerated each call from current field state. No
  // caching, no diff against previous projection.
  // ----------------------------------------------------------------------
  function projectFieldToDOM() {
    if (!_field || !_stateElement) return;
    const records = _field.intake.records;
    const coords = {};
    for (let i = 0; i < records.length; i++) {
      const rec = records[i];
      if (typeof rec.type !== "string") continue;
      const colon = rec.type.indexOf("::");
      // Three cases:
      //   1. "dom::evt" with object value: object keys become coord keys
      //      (e.g., {trigger:"toggle"} -> data-trigger="toggle")
      //   2. "prefix::dimName" with scalar value: dim name = after "::"
      //      (e.g., "time::now" with 1700... -> data-now="1700...")
      //   3. "type-name" without "::": full type becomes dim name
      //      (e.g., "time-now" with 1700... -> data-time-now="1700...")
      // Case 3 supports K2 adapters that publish flat type names matching
      // Phase 7's coord conventions (data-time-now, data-time-perf, etc.).
      if (colon < 0) {
        // Case 3: no prefix - full type is the dim name
        coords[rec.type] = String(rec.value);
        continue;
      }
      const prefix = rec.type.substring(0, colon);
      const dimName = rec.type.substring(colon + 2);
      if (prefix === "dom" && rec.value && typeof rec.value === "object") {
        for (const k of Object.keys(rec.value)) {
          coords[k] = String(rec.value[k]);
        }
      } else {
        coords[dimName] = String(rec.value);
      }
    }
    // Set the substrate-state presence marker if not already present
    if (!_stateElement.hasAttribute("data-substrate-state")) {
      _stateElement.setAttribute("data-substrate-state", "");
    }
    // Write coord values as data-* attributes
    for (const k of Object.keys(coords)) {
      _stateElement.setAttribute("data-" + k, coords[k]);
    }
    _projectionCount++;
  }

  // ----------------------------------------------------------------------
  // addEventListener: flow 4b
  //
  // Wrap a DOM event listener to construct a contributor record and
  // publish to Field.intake. The bridge's wrap-and-publish stays
  // utterly mechanical: it does not contain application logic.
  //
  // recordBuilder(domEvent) -> { type, value, ... } returns the record
  // shape the application's geometry expects. Default: dom::click
  // with the target's data-trigger.
  // ----------------------------------------------------------------------
  function addDOMEventListener(target, eventType, recordBuilder) {
    if (!_field) throw new Error("dom-bridge: not initialized");
    if (!target || typeof target.addEventListener !== "function") return;
    const handler = function (domEvent) {
      const record = (typeof recordBuilder === "function")
        ? recordBuilder(domEvent)
        : defaultEventRecord(eventType, domEvent);
      if (record) {
        _field.intake.publish(record);
      }
    };
    target.addEventListener(eventType, handler, false);
    _listeners.push({ target: target, eventType: eventType, handler: handler });
  }

  function defaultEventRecord(eventType, domEvent) {
    const tgt = domEvent && domEvent.target;
    if (!tgt) return null;
    // Pull data-trigger off the target (the rule the cascade is
    // matching). This mirrors the deposition convention: clickable
    // elements carry data-trigger="<op>" and the cascade matches.
    const trigger = (typeof tgt.getAttribute === "function")
      ? tgt.getAttribute("data-trigger") : null;
    if (!trigger) return null;
    const value = { trigger: trigger };
    // Optional: pull data-input-present if the target also exposes it
    const inputPresent = tgt.getAttribute && tgt.getAttribute("data-input-present");
    if (inputPresent !== null && inputPresent !== undefined) {
      value["input-present"] = String(inputPresent);
    }
    return {
      type: "dom::" + eventType,
      value: value,
      timestamp: (typeof domEvent.timeStamp === "number")
        ? Math.floor(domEvent.timeStamp) : 0,
      source: "dom-bridge"
    };
  }

  // ----------------------------------------------------------------------
  // sampleNextOp: kernel-authoritative read
  //
  // Reads Field.cascadeOutput["--next-op"] (populated by the kernel
  // evaluator). Returns null if no value, the current value otherwise.
  //
  // Caller (CT or tick loop) compares the returned value against
  // last-observed and dedupes before enqueueing.
  // ----------------------------------------------------------------------
  function sampleNextOp() {
    if (!_field || !_field.cascadeOutput) return null;
    const entry = _field.cascadeOutput["--next-op"];
    if (!entry) return null;
    return entry;
  }

  // ----------------------------------------------------------------------
  // sampleNextOpFromCss: browser-CSS-authoritative read
  //
  // Reads the cascade's resolved --next-op via getComputedStyle. This
  // is the alternative path per contract sec 4. Per S2, both paths
  // yield the same value. Useful for runtime cross-check / debugging.
  // ----------------------------------------------------------------------
  function sampleNextOpFromCss() {
    if (!_stateElement || typeof getComputedStyle !== "function") return null;
    const style = getComputedStyle(_stateElement);
    const raw = style.getPropertyValue("--next-op");
    if (!raw) return null;
    // Custom property values come back as strings, possibly quoted
    return raw.trim().replace(/^"(.*)"$/, "$1");
  }

  // ----------------------------------------------------------------------
  // dispatchToCT: combines sample + dedup + enqueue
  //
  // Per contract sec 3: CT.enqueueFromCascade samples Field.cascadeOutput.
  // The bridge handles the CT-side bookkeeping for dedup. Returns true
  // if enqueued, false if deduplicated or no-op.
  // ----------------------------------------------------------------------
  function dispatchToCT(ct) {
    const entry = sampleNextOp();
    if (!entry) return false;
    if (entry.value === _lastObservedNextOp &&
        entry.atStep === _lastObservedAtStep) {
      return false;  // already dispatched
    }
    _lastObservedNextOp = entry.value;
    _lastObservedAtStep = entry.atStep;
    return ct.enqueueInternal("cascade-op", {
      op: entry.value,
      sourceConstraintId: entry.sourceConstraintId,
      observedAtStep: entry.atStep
    });
  }

  // ----------------------------------------------------------------------
  // teardown: remove event listeners
  // ----------------------------------------------------------------------
  function teardown() {
    for (const l of _listeners) {
      try {
        l.target.removeEventListener(l.eventType, l.handler, false);
      } catch (_) { /* best effort */ }
    }
    _listeners = [];
    _field = null;
    _stateElement = null;
  }

  // ----------------------------------------------------------------------
  // Diagnostic accessors (no command path)
  // ----------------------------------------------------------------------
  function diagnostics() {
    return {
      initialized: _field !== null,
      stateElementId: _stateElement && _stateElement.id ? _stateElement.id : null,
      listenerCount: _listeners.length,
      projectionCount: _projectionCount,
      lastObservedNextOp: _lastObservedNextOp,
      lastObservedAtStep: _lastObservedAtStep
    };
  }

  return {
    init: init,
    projectFieldToDOM: projectFieldToDOM,
    addDOMEventListener: addDOMEventListener,
    sampleNextOp: sampleNextOp,
    sampleNextOpFromCss: sampleNextOpFromCss,
    dispatchToCT: dispatchToCT,
    teardown: teardown,
    diagnostics: diagnostics
  };
}

// ============================================================================
// Exports
// ============================================================================

const DOMbridge = Object.freeze({
  createBridge: createBridge
});

if (typeof module !== "undefined" && module.exports) {
  module.exports = DOMbridge;
} else {
  global.DOMbridge = DOMbridge;
}

})(typeof globalThis !== "undefined" ? globalThis : (typeof window !== "undefined" ? window : this));

</script>
